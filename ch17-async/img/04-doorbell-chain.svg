<svg xmlns="http://www.w3.org/2000/svg" width="860" height="330" viewBox="0 0 860 330" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="330" fill="#ffffff"/>
  <defs>
    <marker id="arr4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
    </marker>
  </defs>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">The doorbell chain — nobody watches the wait</text>

  <!-- Row 1 -->
  <rect x="30" y="60" width="240" height="80" rx="10" fill="#eef2f7" stroke="#64748b"/>
  <text x="150" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">1. Data arrives</text>
  <text x="150" y="110" text-anchor="middle" font-size="12" fill="#475569">bytes hit the network card</text>

  <line x1="275" y1="100" x2="320" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="325" y="60" width="240" height="80" rx="10" fill="#fef2f2" stroke="#dc2626"/>
  <text x="445" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#b91c1c">2. Interrupt ⚡ (hardware)</text>
  <text x="445" y="110" text-anchor="middle" font-size="12" fill="#7f1d1d">card pokes the CPU — no thread involved</text>

  <line x1="570" y1="100" x2="615" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="620" y="60" width="210" height="80" rx="10" fill="#eef2f7" stroke="#64748b"/>
  <text x="725" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">3. OS kernel</text>
  <text x="725" y="110" text-anchor="middle" font-size="12" fill="#475569">marks socket "ready"</text>

  <!-- connector down -->
  <path d="M725,145 L725,175" stroke="#475569" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Row 2 (right to left) -->
  <rect x="620" y="180" width="210" height="90" rx="10" fill="#eff6ff" stroke="#2563eb"/>
  <text x="725" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8">4. Reactor wakes</text>
  <text x="725" y="226" text-anchor="middle" font-size="12" fill="#1e3a8a">1 sleeping thread, epoll:</text>
  <text x="725" y="245" text-anchor="middle" font-size="12" fill="#1e3a8a">"any of my 10,000 ready?"</text>

  <line x1="615" y1="225" x2="570" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="325" y="180" width="240" height="90" rx="10" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="445" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#15803d">5. Waker knocks</text>
  <text x="445" y="226" text-anchor="middle" font-size="12" fill="#14532d">"task #4217 — your data</text>
  <text x="445" y="245" text-anchor="middle" font-size="12" fill="#14532d">is here, wake up!"</text>

  <line x1="320" y1="225" x2="275" y2="225" stroke="#475569" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="30" y="180" width="240" height="90" rx="10" fill="#eef2f7" stroke="#64748b"/>
  <text x="150" y="206" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">6. Task re-queued</text>
  <text x="150" y="226" text-anchor="middle" font-size="12" fill="#475569">next free worker thread</text>
  <text x="150" y="245" text-anchor="middle" font-size="12" fill="#475569">picks it up, drives it on</text>

  <text x="430" y="305" text-anchor="middle" font-size="13" fill="#64748b">while nothing arrives: steps 1–6 cost zero CPU — everyone is asleep, the arrival itself rings the bell</text>
</svg>
