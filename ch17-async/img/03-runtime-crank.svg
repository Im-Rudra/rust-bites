<svg xmlns="http://www.w3.org/2000/svg" width="860" height="300" viewBox="0 0 860 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="300" fill="#ffffff"/>
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
    </marker>
    <marker id="arr3g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#16a34a"/>
    </marker>
  </defs>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">The runtime breaks the chicken-and-egg</text>

  <!-- main -->
  <rect x="30" y="110" width="170" height="80" rx="10" fill="#eef2f7" stroke="#64748b"/>
  <text x="115" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">main()</text>
  <text x="115" y="162" text-anchor="middle" font-size="12" fill="#475569">sync — cannot .await</text>

  <!-- arrow main->runtime -->
  <line x1="205" y1="150" x2="295" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arr3)"/>
  <text x="250" y="136" text-anchor="middle" font-size="12" fill="#475569">trpl::run(future)</text>

  <!-- runtime -->
  <rect x="300" y="90" width="230" height="120" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="415" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#1d4ed8">RUNTIME (engine)</text>
  <text x="415" y="144" text-anchor="middle" font-size="12" fill="#1e3a8a">a normal function with a crank:</text>
  <text x="415" y="164" text-anchor="middle" font-size="12" fill="#1e3a8a">poll — "can you make progress?"</text>
  <text x="415" y="190" text-anchor="middle" font-size="12" fill="#1e3a8a">poll → park → wake → poll ...</text>

  <!-- tasks -->
  <rect x="590" y="70" width="240" height="60" rx="8" fill="#f0fdf4" stroke="#16a34a"/>
  <text x="710" y="95" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803d">task A — progressing</text>
  <text x="710" y="115" text-anchor="middle" font-size="11" fill="#14532d">being polled right now</text>

  <rect x="590" y="150" width="240" height="60" rx="8" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="710" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">tasks B, C — parked zzz</text>
  <text x="710" y="195" text-anchor="middle" font-size="11" fill="#78350f">waiting for their knock (waker)</text>

  <!-- arrows runtime->tasks -->
  <line x1="530" y1="115" x2="585" y2="100" stroke="#16a34a" stroke-width="2" marker-end="url(#arr3g)"/>
  <line x1="530" y1="175" x2="585" y2="180" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arr3)"/>

  <text x="430" y="265" text-anchor="middle" font-size="13" fill="#64748b">async can't start itself — a sync engine cranks the first future, then .await flows inside</text>
</svg>
