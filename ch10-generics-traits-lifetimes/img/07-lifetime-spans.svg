<svg xmlns="http://www.w3.org/2000/svg" width="860" height="320" viewBox="0 0 860 320" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="320" fill="#ffffff"/>
  <text x="430" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">longest(&amp;string1, &amp;string2) — the result's leash is the SHORTER life</text>

  <!-- time axis -->
  <line x1="60" y1="270" x2="820" y2="270" stroke="#94a3b8" stroke-width="2"/>
  <text x="440" y="295" text-anchor="middle" font-size="12" fill="#64748b">time (top to bottom of the code) →</text>

  <!-- string1 bar: long -->
  <rect x="80" y="70" width="700" height="34" rx="8" fill="#dcfce7" stroke="#16a34a"/>
  <text x="95" y="92" font-size="13" fill="#14532d">string1 — alive the whole time</text>

  <!-- string2 bar: short -->
  <rect x="230" y="120" width="280" height="34" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="245" y="142" font-size="13" fill="#78350f">string2 — inner scope only</text>
  <line x1="510" y1="120" x2="510" y2="250" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="518" y="140" font-size="12" fill="#dc2626">string2 dies here</text>

  <!-- result bar: limited to overlap -->
  <rect x="300" y="170" width="210" height="34" rx="8" fill="#eff6ff" stroke="#2563eb"/>
  <text x="315" y="192" font-size="13" fill="#1e3a8a">result usable here ✅</text>

  <!-- forbidden zone -->
  <rect x="510" y="170" width="270" height="34" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-dasharray="6 4"/>
  <text x="525" y="192" font-size="13" fill="#b91c1c">using result here ❌ E0597</text>

  <text x="430" y="240" text-anchor="middle" font-size="13" fill="#475569">'a = the overlap of the inputs' lives. The compiler assumes the worst: result MIGHT be string2.</text>
</svg>
